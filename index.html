<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Premium Bonds | Multi-Occasion Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        :root { --gold: #ffd700; --glass: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Full HD Background */
        .screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; padding: 20px; text-align: center;
            background-size: cover; background-position: center; transition: opacity 0.6s ease;
        }
        .active { display: flex; opacity: 1; z-index: 100; }
        .screen::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.55); z-index: -1; }

        /* Creator UI */
        #generator { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(circle, #1a1a1a, #000); overflow-y: auto; padding: 30px 10px; }
        .input-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; font-size: 0.9rem; outline: none; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Card & Pet Styling */
        .luxury-card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid var(--gold); width: 100%; max-width: 400px; position: relative; }
        .pet-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .pet { position: absolute; width: 80px; filter: drop-shadow(0 0 10px var(--gold)); }
        .pet-l { left: -30px; bottom: -20px; animation: dance 1.5s infinite alternate; }
        .pet-r { right: -30px; top: -20px; animation: dance 1.5s infinite alternate-reverse; }
        @keyframes dance { from { transform: scale(1) translateY(0); } to { transform: scale(1.1) translateY(-10px); } }

        h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.6rem; margin-bottom: 10px; }
        p { font-size: 1rem; line-height: 1.5; }
        .nav-btn { background: var(--gold); color: #000; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; margin-top: 25px; cursor: pointer; }

        .cert-card { background: #fff; color: #333; padding: 25px; border-radius: 2px; width: 95%; max-width: 380px; border: 10px double #d4af37; position: relative; }
        .signature { font-family: 'Great Vibes', cursive; font-size: 2rem; border-bottom: 2px solid #333; min-width: 120px; display: inline-block; color: #000; }
        
        .floating-item { position: absolute; pointer-events: none; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<div id="generator">
    <h1 style="color:var(--gold); font-family:'Playfair Display'; margin-bottom:15px;">Elite Experience</h1>
    <div class="input-card">
        <input type="text" id="bIn" placeholder="Apna Naam (Your Name)">
        <input type="text" id="gIn" placeholder="Unka Naam (Receiver Name)">
        
        <label style="color:var(--gold); font-size:12px;">Occasion / Topic:</label>
        <select id="eventIn">
            <option value="birthday">Happy Birthday 🎂</option>
            <option value="love">Express Love ❤️</option>
            <option value="congrats">Congratulations / Job 🏆</option>
            <option value="missyou">Miss You 🥺</option>
            <option value="sorry">Say Sorry 🙏</option>
            <option value="friendship">Best Friends Forever 🤝</option>
        </select>

        <label style="color:var(--gold); font-size:12px;">Relation:</label>
        <select id="relIn">
            <option value="gf">Girlfriend / Partner ❤️</option>
            <option value="brother">Brother / Bhai 🤜🤛</option>
            <option value="sister">Sister / Behan 🌸</option>
            <option value="friend">Bestie 💎</option>
        </select>

        <input type="text" id="sIn" placeholder="YouTube Link (Song)">
        <button class="btn-gold" onclick="makeLink()">Generate Magic ✨</button>
        
        <div id="resBox" style="display:none; margin-top:20px;">
            <p id="finalLink" style="font-size:10px; word-break:break-all; background:#000; padding:10px; color:#0f0; border:1px dashed var(--gold);"></p>
            <button class="btn-gold" style="background:#fff" onclick="copyL()">Copy Link & Send ❤️</button>
        </div>
    </div>
</div>

<div id="experience" style="display:none;">
    <div id="p1" class="screen active">
        <h1 id="wish-head" style="font-size: 2.5rem; color:var(--gold); font-family:'Playfair Display';"></h1>
        <div style="font-size: 80px; cursor:pointer; margin:20px;" onclick="next(2)">🎁</div>
        <p>TAP THE GIFT TO UNLOCK</p>
    </div>

    <div id="p2" class="screen">
        <div class="luxury-card">
            <h2>A Special Tune For You</h2>
            <iframe id="yt-frame" width="100%" height="200" src="" frameborder="0" allow="autoplay" style="border-radius:15px;"></iframe>
        </div>
        <button class="nav-btn" onclick="next(3)">Listen & Continue</button>
    </div>

    <div id="p3" class="screen"><div class="luxury-card"><div class="pet-container"><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5eGZqZnd4eXh6eXh6eXh6eXh6eXh6eXh6eXh6eXh6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/vNpx56a9Kz0oE/giphy.gif" class="pet pet-l"><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5eGZqZnd4eXh6eXh6eXh6eXh6eXh6eXh6eXh6eXh6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/LMc5fGZVRp5v2/giphy.gif" class="pet pet-r"></div><h2 id="t1"></h2><p id="m1"></p></div><button class="nav-btn" onclick="next(4)">Next Heartbeat</button></div>
    
    <div id="p4" class="screen"><div class="luxury-card"><div class="pet-container"><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5eGZqZnd4eXh6eXh6eXh6eXh6eXh6eXh6eXh6eXh6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKSjPqcKFBwS092/giphy.gif" class="pet pet-l"></div><h2 id="t2"></h2><p id="m2"></p></div><button class="nav-btn" onclick="next(5)">Go Ahead</button></div>
    
    <div id="p5" class="screen"><div class="luxury-card"><div class="pet-container"><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5eGZqZnd4eXh6eXh6eXh6eXh6eXh6eXh6eXh6eXh6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/26hpKpxWVKvDLfAA8/giphy.gif" class="pet pet-r"></div><h2 id="t3"></h2><p id="m3"></p></div><button class="nav-btn" onclick="next(6)">Feeling Happy?</button></div>
    
    <div id="p6" class="screen"><div class="luxury-card"><h2 id="t4">The Secret</h2><p id="m4"></p></div><button class="nav-btn" onclick="next(7)">Almost There</button></div>

    <div id="p7" class="screen"><div class="luxury-card"><h2>The Question</h2><p id="m5"></p></div><div style="display:flex; gap:10px; margin-top:20px; justify-content:center; width:100%"><button class="nav-btn" style="background:#2ecc71; color:#fff;" onclick="next(8)">YES! ✅</button><button id="no-btn" class="nav-btn" style="background:#fff;" onmouseover="dodge()">NO ❌</button></div></div>

    <div id="p8" class="screen">
        <div class="cert-card">
            <h3 id="cert-title" style="border-bottom: 2px solid #333; margin-bottom: 10px;">OFFICIAL CERTIFICATE</h3>
            <p style="font-size: 11px;">Verification of True Bond:</p>
            <div style="margin: 15px 0;">
                <div class="signature bn"></div>
                <p style="font-weight:bold;">&</p>
                <div class="signature gn"></div>
            </div>
            <p id="status-text" style="color:#b8860b; font-weight:bold;"></p>
        </div>
        <button class="nav-btn" onclick="next(9)">Final Surprise</button>
    </div>

    <div id="p9" class="screen">
        <h1 id="final-wish" style="font-family:'Great Vibes'; font-size:3.5rem; color:var(--gold);"></h1>
        <div class="luxury-card"><p id="m-last"></p></div>
        <p style="margin-top:20px;">Created for You with Love ❤️</p>
    </div>
</div>

<script>
    const database = {
        birthday: {
            gf: { bg: "https://images.unsplash.com/photo-1513151233558-d860c5398176", t: ["Princess", "My World", "Soulmate", "Promise", "Forever"], m: ["Duniya ki sabse pyari ladki ko janamdin mubarak!", "Tum meri har dua ka asar ho.", "Aaj tumhari har khwahish meri hai.", "Main tumhara saath kabhi nahi chhodunga.", "Kya hum hamesha aise hi saath rahenge?"], cert: ["QUEEN OF MY HEART", "HAPPY BIRTHDAY LOVE! ❤️"] },
            brother: { bg: "https://images.unsplash.com/photo-1520110120835-c9653dfa4335", t: ["Bhai", "Sher", "Partner", "Wall", "Legend"], m: ["Happy Birthday mere bhai! Tu meri jaan hai.", "Tere jaisa bhai kismat walon ko milta hai.", "Har musibat mein tere saath khada hoon.", "Party taiyar rakh saale!", "World's Best Brother?"], cert: ["LEGENDARY BROTHER", "BHAI-BHAI FOREVER! 🤜🤛"] }
        },
        congrats: {
            brother: { bg: "https://images.unsplash.com/photo-1522244479694-485232f3f7e3", t: ["Success", "Champion", "Winner", "Hardwork", "Pride"], m: ["Nayi Job ke liye bahut bahut mubarak ho bhai!", "Mujhe pata tha tu kar dikhayega.", "Teri mehnat rang layi mere sher.", "Ab toh party banti hai!", "Hamesha aise hi tarakki karna."], cert: ["MR. SUCCESSFUL", "CONGRATULATIONS BRO! 🏆"] },
            friend: { bg: "https://images.unsplash.com/photo-1552566626-52f8b828add9", t: ["Winner", "Party Time", "Achievement", "Future", "Proud"], m: ["Congrats mere yaar! Tune toh faad di.", "Party kab de raha hai ye bata?", "Tera career ab ekdum set hai.", "Doston ki shaan hai tu.", "Kya hum world ki coolest jodi hain?"], cert: ["OFFICIAL CHAMPION", "PROUD OF YOU! 🤝"] }
        }
        // Fallback generic logic will handle others
    };

    function makeLink() {
        const b = document.getElementById('bIn').value.trim();
        const g = document.getElementById('gIn').value.trim();
        const ev = document.getElementById('eventIn').value;
        const rel = document.getElementById('relIn').value;
        const sUrl = document.getElementById('sIn').value.trim();
        
        if(!b || !g) { alert("Please enter both names!"); return; }

        let sid = '-8C_2BBVWk8'; 
        if(sUrl.includes('v=')) sid = sUrl.split('v=')[1].substring(0, 11);
        else if(sUrl.includes('youtu.be/')) sid = sUrl.split('youtu.be/')[1].substring(0, 11);

        const base = window.location.origin + window.location.pathname;
        const finalUrl = `${base}?boy=${encodeURIComponent(b)}&girl=${encodeURIComponent(g)}&ev=${ev}&rel=${rel}&song=${sid}`;
        
        document.getElementById('finalLink').innerText = finalUrl;
        document.getElementById('resBox').style.display = 'block';
    }

    function copyL() {
        navigator.clipboard.writeText(document.getElementById('finalLink').innerText);
        alert("Link Copied! Send it now. ✨");
    }

    const params = new URLSearchParams(window.location.search);
    const bn = params.get('boy'), gn = params.get('girl'), ev = params.get('ev'), rel = params.get('rel'), sn = params.get('song');

    if(bn && gn) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('experience').style.display = 'block';
        
        // Dynamic content logic
        const cat = (database[ev] && database[ev][rel]) ? database[ev][rel] : {
            bg: "https://images.unsplash.com/photo-1518133835878-5a93cc3f89e5",
            t: ["Hello", "Listen", "The Truth", "Special", "Real Bond"],
            m: [`Hi ${gn}, ye tumhare liye ek chota sa surprise hai.`, `Tum mere liye bahut special ho.`, `Hamesha aise hi khush rehna.`, `Duniya ki har khushi tumhe mile.`, `Kya tum hamesha mere saath rahoge/rahogi?`],
            cert: ["OFFICIAL BOND", "STAY CONNECTED! ❤️"]
        };

        document.querySelectorAll('.screen').forEach(s => s.style.backgroundImage = `url('${cat.bg}')`);
        document.getElementById('wish-head').innerText = (ev === 'birthday') ? `Happy Birthday ${gn}!` : `For ${gn}`;
        document.getElementById('t1').innerText = cat.t[0]; document.getElementById('m1').innerText = cat.m[0];
        document.getElementById('t2').innerText = cat.t[1]; document.getElementById('m2').innerText = cat.m[1];
        document.getElementById('t3').innerText = cat.t[2]; document.getElementById('m3').innerText = cat.m[2];
        document.getElementById('t4').innerText = cat.t[3]; document.getElementById('m4').innerText = cat.m[3];
        document.getElementById('m5').innerText = cat.m[4];
        document.getElementById('status-text').innerText = cat.cert[0];
        document.getElementById('final-wish').innerText = "For You ❤️";
        document.getElementById('m-last').innerText = cat.cert[1];

        document.querySelectorAll('.bn').forEach(e => e.innerText = bn);
        document.querySelectorAll('.gn').forEach(e => e.innerText = gn);
        document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${sn || '-8C_2BBVWk8'}?autoplay=1`;
        
        startRain(['❤️','✨','💎']);
    }

    function next(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        setTimeout(() => { document.getElementById('p' + n).classList.add('active'); }, 50);
    }

    function dodge() {
        const b = document.getElementById('no-btn');
        b.style.position = 'fixed';
        b.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        b.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    }

    function startRain(items) {
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'floating-item';
            f.innerHTML = items[Math.floor(Math.random()*items.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = Math.random() * 20 + 15 + 'px';
            f.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }, 500);
    }
</script>
</body>
</html>
