<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Bonds | Premium Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        
        :root { --gold: #ffd700; --glass: rgba(0, 0, 0, 0.75); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; 
        }

        /* HD Background Fix */
        .screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; padding: 25px; text-align: center;
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            transition: opacity 0.8s ease;
        }
        .active { display: flex; opacity: 1; z-index: 100; }
        .screen::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: -1; }

        /* Generator UI */
        #generator { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #222, #000); }
        .input-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }

        /* Elements */
        .luxury-card { background: var(--glass); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; max-width: 400px; z-index: 10; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 10px; }
        .nav-btn { background: var(--gold); color: #000; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        /* Cute Pet Animation */
        .cute-pet { position: absolute; width: 80px; z-index: 5; bottom: 20px; animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Rain effect */
        .floating-item { position: absolute; pointer-events: none; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        .cert-card { background: #fff; color: #333; padding: 25px; border-radius: 5px; width: 90%; max-width: 380px; border: 8px double #d4af37; text-align: center; }
        .signature { font-family: 'Great Vibes', cursive; font-size: 1.8rem; border-bottom: 1px solid #333; display: inline-block; padding: 0 10px; }
    </style>
</head>
<body>

<div id="generator">
    <h2 style="color:var(--gold); margin-bottom:15px;">Elite Experience Creator</h2>
    <div class="input-card">
        <input type="text" id="bIn" placeholder="Apna Naam (Your Name)">
        <input type="text" id="gIn" placeholder="Unka Naam (Receiver Name)">
        <select id="relIn">
            <option value="gf">Girlfriend (Romantic ❤️)</option>
            <option value="daddy">Daddy (Father & Son 🧬)</option>
            <option value="brother">Brother (Best Bro 🤜🤛)</option>
            <option value="sister">Sister (Sweet Sister 🌸)</option>
            <option value="friend">Friend / Bestie (Yaara 🤝)</option>
        </select>
        <input type="text" id="sIn" placeholder="YouTube Link (Optional)">
        <button class="btn-gold" onclick="makeLink()">Generate Magic ✨</button>
        <div id="resBox" style="display:none; margin-top:15px;">
            <p id="finalLink" style="font-size:10px; word-break:break-all; color:#0f0; background:#000; padding:10px; margin-bottom:10px;"></p>
            <button class="btn-gold" style="background:#fff" onclick="copyL()">Copy & Send ❤️</button>
        </div>
    </div>
</div>

<div id="experience" style="display:none;">
    <div id="p1" class="screen active">
        <h1 id="main-wish" style="font-family: 'Playfair Display'; font-size: 2.2rem;"></h1>
        <div style="font-size: 70px; cursor: pointer; margin: 20px 0; filter: drop-shadow(0 0 10px gold);" onclick="next(2)">🎁</div>
        <p>TAP TO UNLOCK GIFT</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5eGZqZnd4eXh6eXh6eXh6eXh6eXh6eXh6eXh6eXh6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKSjPqcKFBwS092/giphy.gif" class="cute-pet" style="left:10%">
    </div>

    <div id="p2" class="screen">
        <div class="luxury-card">
            <h2 id="music-title">A Special Song</h2>
            <iframe id="yt-frame" width="100%" height="180" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
        <button class="nav-btn" onclick="next(3)">Next Magic</button>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5eGZqZnd4eXh6eXh6eXh6eXh6eXh6eXh6eXh6eXh6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/LMc5fGZVRp5v2/giphy.gif" class="cute-pet" style="right:10%">
    </div>

    <div id="p3" class="screen">
        <div class="luxury-card"><h2 id="t1">Title</h2><p id="m1">Message</p></div>
        <button class="nav-btn" onclick="next(4)">Keep Going</button>
    </div>

    <div id="p4" class="screen">
        <div class="luxury-card"><h2 id="t2">Title</h2><p id="m2">Message</p></div>
        <button class="nav-btn" onclick="next(5)">One More Thing</button>
    </div>

    <div id="p5" class="screen">
        <h1 id="question" style="color:var(--gold);"></h1>
        <div class="luxury-card"><p id="m3"></p></div>
        <div style="display:flex; gap:15px; margin-top:20px;">
            <button class="nav-btn" style="background:#2ecc71; color:white;" onclick="next(6)">YES! ✅</button>
            <button id="no-btn" class="nav-btn" style="background:#ff4757; color:white;" onmouseover="dodge()">NO ❌</button>
        </div>
    </div>

    <div id="p6" class="screen">
        <div class="cert-card">
            <h3 id="cert-head">CERTIFICATE</h3>
            <p style="font-size: 12px;">This confirms the bond between:</p>
            <div style="margin: 15px 0;">
                <div class="signature bn"></div>
                <p>&</p>
                <div class="signature gn"></div>
            </div>
            <p id="status-text" style="color:#b8860b; font-weight:bold;"></p>
        </div>
        <h2 id="final-wish" style="margin-top:15px;"></h2>
    </div>
</div>

<script>
    const content = {
        gf: {
            bg: "https://images.unsplash.com/photo-1518133835878-5a93cc3f89e5?q=80&w=1000&auto=format&fit=crop",
            flw: ['❤️','🌹','✨'], t: ["Pehli Dua", "Waada", "Forever Mine?"],
            m: ["Aapki muskurahat meri duniya hai.", "Main hamesha aapka sath nibhaunga.", "Kya aap hamesha ke liye meri banna chahungi?"],
            cert: ["MARRIAGE CERTIFICATE", "MARRIED IN HEART ❤️", "Mubarak Ho! Shaadi Pakki 💍"]
        },
        daddy: {
            bg: "https://images.unsplash.com/photo-1506784983877-45594efa4cbe?q=80&w=1000&auto=format&fit=crop",
            flw: ['✨','⭐','👑'], t: ["My Hero", "Inspiration", "Best Dad?"],
            m: ["Aapne hamesha meri himmat badhayi.", "Main bada hokar aap jaisa banna chahta hoon.", "Kya hum world ki best Dad-Son jodi hain?"],
            cert: ["DNA BOND CERTIFICATE", "WORLD'S BEST FATHER 🧬", "Baap-Beta No. 1! 🏆"]
        },
        brother: {
            bg: "https://images.unsplash.com/photo-1552196564-972b4938662c?q=80&w=1000&auto=format&fit=crop",
            flw: ['🔥','⚡','🤜'], t: ["Partner in Crime", "Strong Wall", "Bro Code?"],
            m: ["Bhai tu sirf bhai nahi, meri jaan hai.", "Har mushkil mein tere sath khada hoon.", "Kya hamesha mere 'Partner in Crime' rahoge?"],
            cert: ["BRO CODE CONTRACT", "LEGENDARY BROTHERS 🤜🤛", "Bhai-Bhai Forever! 👑"]
        },
        sister: {
            bg: "https://images.unsplash.com/photo-1516627145497-ae6968895b74?q=80&w=1000&auto=format&fit=crop",
            flw: ['🌸','🎀','🍬'], t: ["Angel", "Second Mother", "Sweetest Soul?"],
            m: ["Aapki khushi mere liye sabse upar hai.", "Ghar ki raunaq aap se hi hai.", "Kya hamesha meri pyari behna ban kar rahogi?"],
            cert: ["BOND OF PROTECTION", "BEST SISTER EVER 💖", "Behna Ka Pyar! 🍭"]
        },
        friend: {
            bg: "https://images.unsplash.com/photo-1491438590914-bc09fcaaf77a?q=80&w=1000&auto=format&fit=crop",
            flw: ['🍻','🤞','💎'], t: ["Yaara", "Backbone", "Bestie Forever?"],
            m: ["Tere jaisa yaar kahan, kahan aisa yaarana.", "Duniya badal jaye, par hum nahi badlenge.", "Hamesha sath rahega na mere yaar?"],
            cert: ["FRIENDSHIP DEED", "TRUE BESTIES 🤝", "Dosti Zindabad! 💎"]
        }
    };

    function makeLink() {
        const b = document.getElementById('bIn').value.trim();
        const g = document.getElementById('gIn').value.trim();
        const r = document.getElementById('relIn').value;
        const sUrl = document.getElementById('sIn').value.trim();
        
        if(!b || !g) { alert("Please fill both names!"); return; }

        let sid = '-8C_2BBVWk8'; 
        if(sUrl.includes('v=')) sid = sUrl.split('v=')[1].substring(0, 11);
        else if(sUrl.includes('youtu.be/')) sid = sUrl.split('youtu.be/')[1].substring(0, 11);

        const base = window.location.origin + window.location.pathname;
        const finalUrl = `${base}?boy=${encodeURIComponent(b)}&girl=${encodeURIComponent(g)}&rel=${r}&song=${sid}`;
        
        document.getElementById('finalLink').innerText = finalUrl;
        document.getElementById('resBox').style.display = 'block';
    }

    function copyL() {
        navigator.clipboard.writeText(document.getElementById('finalLink').innerText);
        alert("Link Copied! Send it now. ❤️");
    }

    const params = new URLSearchParams(window.location.search);
    const bn = params.get('boy'), gn = params.get('girl'), rel = params.get('rel') || 'gf', sn = params.get('song');

    if(bn && gn) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('experience').style.display = 'block';
        
        const c = content[rel];
        document.querySelectorAll('.screen').forEach(s => s.style.backgroundImage = `url('${c.bg}')`);
        
        document.getElementById('main-wish').innerHTML = `Happy Birthday <br><span style="color:var(--gold)">${gn}</span>!`;
        document.getElementById('t1').innerText = c.t[0];
        document.getElementById('m1').innerText = c.m[0];
        document.getElementById('t2').innerText = c.t[1];
        document.getElementById('m2').innerText = c.m[1];
        document.getElementById('question').innerText = c.t[2];
        document.getElementById('m3').innerText = c.m[2];
        
        document.getElementById('cert-head').innerText = c.cert[0];
        document.getElementById('status-text').innerText = `STATUS: ${c.cert[1]}`;
        document.getElementById('final-wish').innerText = c.cert[2];
        
        document.querySelectorAll('.bn').forEach(e => e.innerText = bn);
        document.querySelectorAll('.gn').forEach(e => e.innerText = gn);
        
        document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${sn || '-8C_2BBVWk8'}?autoplay=1`;
        
        startRain(c.flw);
    }

    function next(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        setTimeout(() => { document.getElementById('p' + n).classList.add('active'); }, 50);
    }

    function dodge() {
        const b = document.getElementById('no-btn');
        b.style.position = 'fixed';
        b.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        b.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    }

    function startRain(items) {
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'floating-item';
            f.innerHTML = items[Math.floor(Math.random()*items.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = Math.random() * 20 + 20 + 'px';
            f.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }, 400);
    }
</script>
</body>
</html>
