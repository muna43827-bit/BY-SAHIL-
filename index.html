<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Link Generator | Forever</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,900;1,900&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ff758c 0%, #ff1f4f 100%);
            color: #fff; font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- GENERATOR --- */
        #generator {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; text-align: center;
        }

        .input-group {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3);
            width: 100%; max-width: 400px;
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 50px;
            border: none; outline: none; font-size: 1rem; text-align: center;
        }

        #resultLink {
            margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3);
            border-radius: 10px; word-break: break-all; display: none; font-size: 0.8rem;
        }

        /* --- PROPOSAL SCREENS --- */
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; padding: 20px; text-align: center;
            transition: 0.5s;
        }
        
        .active { display: flex; z-index: 100; }

        .luxury-card {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 30px; border-radius: 40px 10px 40px 10px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 90%; max-width: 400px;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .jaatni-font { font-family: 'Dancing Script', cursive; font-size: 3rem; }
        
        .btn-gold {
            background: var(--gold); color: #000; border: none;
            padding: 15px 35px; border-radius: 100px; font-weight: 900;
            cursor: pointer; margin-top: 20px;
        }

        #noBtn { background: #fff; color: #ff1f4f; transition: 0.1s; }
        
        .flower { position: absolute; pointer-events: none; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="generator">
    <h1 class="jaatni-font">Love Link Creator</h1>
    <div class="input-group">
        <input type="text" id="boyName" placeholder="Enter Your Name">
        <input type="text" id="girlName" placeholder="Enter Partner's Name">
        <button class="btn-gold" onclick="generateLink()">Generate Magic ✨</button>
        <div id="resultLink"></div>
        <button id="copyBtn" class="btn-gold" style="display:none; background:#fff;" onclick="copyLink()">Copy Link 📋</button>
    </div>
</div>

<div id="proposalContent" style="display:none;">
    <div id="p1" class="screen active">
        <h1 class="jaatni-font">Happy Birthday <br><span class="gName"></span>!</h1>
        <div style="font-size: 100px; cursor: pointer;" onclick="startMagic()">🎂</div>
        <p>[ TAP CAKE FOR MAGIC ]</p>
    </div>

    <div class="screen" id="p2">
        <div class="luxury-card">
            <h1>The First Dream ✨</h1>
            <p>"Aaj ka din khaas hai kyunki aaj meri rani ka janamdin hai. <span class="bName"></span> ki har dua aapke liye hai."</p>
        </div>
        <button class="btn-gold" onclick="next(3)">Next ➡️</button>
    </div>

    <div class="screen" id="p3">
        <div style="font-size: 80px;">💍</div>
        <h1 class="jaatni-font">Will you marry me?</h1>
        <div class="luxury-card">
            <p>"Kya tum hamesha ke liye meri bankar rahogi?"</p>
        </div>
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <button class="btn-gold" style="background:#2ecc71; color:#fff;" onclick="next(4)">YES! ✅</button>
            <button class="btn-gold" id="noBtn" onmouseover="dodge()">NO ❌</button>
        </div>
    </div>

    <div class="screen" id="p4">
        <h1 class="jaatni-font">Mubarak Ho!</h1>
        <div class="luxury-card">
            <p style="font-size: 1.5rem; color: #ff1f4f; font-weight: bold;">HUM EK HAIN!</p>
            <p><span class="bName"></span> ❤️ <span class="gName"></span></p>
        </div>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
    function generateLink() {
        const boy = document.getElementById('boyName').value;
        const girl = document.getElementById('girlName').value;
        if(!boy || !girl) return alert("Fill both names!");
        const finalUrl = window.location.href.split('?')[0] + `?boy=${encodeURIComponent(boy)}&girl=${encodeURIComponent(girl)}`;
        document.getElementById('resultLink').innerText = finalUrl;
        document.getElementById('resultLink').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'inline-block';
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('resultLink').innerText);
        alert("Link Copied! ❤️");
    }

    const urlParams = new URLSearchParams(window.location.search);
    const b = urlParams.get('boy'), g = urlParams.get('girl');
    if(b && g) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('proposalContent').style.display = 'block';
        document.querySelectorAll('.bName').forEach(e => e.innerText = b);
        document.querySelectorAll('.gName').forEach(e => e.innerText = g);
    }

    function startMagic() {
        document.getElementById('myAudio').play();
        rain();
        next(2);
    }

    function next(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('p' + n).classList.add('active');
    }

    function dodge() {
        const btn = document.getElementById('noBtn');
        btn.style.position = 'fixed';
        btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    }

    function rain() {
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerHTML = ['🌸','❤️','✨'][Math.floor(Math.random()*3)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }, 300);
    }
</script>
</body>
</html>
