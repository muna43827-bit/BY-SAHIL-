<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternal Bonds | Multi-Special Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        :root { --gold: #ffd700; --glass: rgba(0, 0, 0, 0.6); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        #generator { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; background: linear-gradient(45deg, #1a1a1a, #000); z-index: 1000; overflow-y: auto; }
        .input-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; text-align: center; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; }

        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; background-size: cover; background-position: center; transition: opacity 1.5s ease; opacity: 0; }
        .active { display: flex; opacity: 1; z-index: 100; }
        .screen::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: -1; }
        .luxury-card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; max-width: 450px; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 15px; }
        .nav-btn { background: var(--gold); color: #000; border: none; padding: 12px 40px; border-radius: 50px; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,215,0,0.3); }
        #yt-frame { width: 100%; height: 180px; border-radius: 15px; margin-top: 15px; border: 1px solid var(--gold); }

        .cert-card { background: #fdfdfd; color: #333; padding: 30px; border-radius: 5px; width: 95%; max-width: 400px; border: 8px double #d4af37; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        .signature { font-family: 'Great Vibes', cursive; font-size: 2rem; border-bottom: 2px solid #333; min-width: 100px; display: inline-block; padding: 0 10px; }
        .flower { position: absolute; pointer-events: none; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<div id="generator">
    <h1 style="font-family: 'Playfair Display'; color:var(--gold)">Elite Link Creator</h1>
    <div class="input-card">
        <input type="text" id="bIn" placeholder="Apna Naam">
        <input type="text" id="gIn" placeholder="Unka Naam">
        <select id="relIn">
            <option value="gf">Girlfriend (Romantic ❤️)</option>
            <option value="daddy">Daddy (Father & Son 🧬)</option>
            <option value="brother">Brother (Best Bro 🤜🤛)</option>
            <option value="sister">Sister (Sweet Sister 🌸)</option>
            <option value="friend">Friend / Bestie (Yaara 🤝)</option>
        </select>
        <input type="text" id="sIn" placeholder="YouTube Link (Song)">
        <button class="btn-gold" onclick="makeLink()">Generate Magic ✨</button>
        <div id="resBox" style="display:none; margin-top:20px;">
            <p id="finalLink" style="font-size:0.7rem; word-break:break-all; background:rgba(255,255,255,0.1); padding:10px;"></p>
            <button class="btn-gold" style="background:#fff" onclick="copyL()">Copy & Send ❤️</button>
        </div>
    </div>
</div>

<div id="experience" style="display:none;">
    <div id="p1" class="screen active">
        <h1 id="main-wish" style="font-family: 'Playfair Display'; font-size: 2.5rem;">Happy Birthday!</h1>
        <div style="font-size: 80px; cursor: pointer; margin: 20px 0;" onclick="next(2)">🎁</div>
        <p>TAP THE GIFT TO UNLOCK</p>
    </div>

    <div id="p2" class="screen">
        <div class="luxury-card">
            <h2>Musical Memory</h2>
            <iframe id="yt-frame" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
        <button class="nav-btn" onclick="next(3)">Open Message</button>
    </div>

    <div id="p3" class="screen"><div class="luxury-card"><h2 id="t1">Title</h2><p id="m1">Message</p></div><button class="nav-btn" onclick="next(4)">Continue</button></div>
    <div id="p4" class="screen"><div class="luxury-card"><h2 id="t2">Title</h2><p id="m2">Message</p></div><button class="nav-btn" onclick="next(5)">Next</button></div>

    <div id="p5" class="screen">
        <h1 id="question" style="font-family: 'Playfair Display'; color: var(--gold); font-size: 2.2rem;">Ready?</h1>
        <div class="luxury-card"><p id="m3">Final Ask</p></div>
        <div style="display:flex; gap:20px; margin-top:30px; position:relative; justify-content:center; width:100%">
            <button class="nav-btn" style="background:#2ecc71; color:#fff; width:120px;" onclick="next(6)">YES! ✅</button>
            <button id="no-btn" class="nav-btn" style="background:#fff; color:#333; width:120px;" onmouseover="dodge()">NO ❌</button>
        </div>
    </div>

    <div id="p6" class="screen">
        <div class="cert-card">
            <h3 id="cert-title" style="border-bottom: 2px solid #333; margin-bottom: 10px; font-family: 'Playfair Display';">CERTIFICATE</h3>
            <p id="cert-desc" style="font-size: 0.8rem; margin: 5px 0;">Official Bond of Love:</p>
            <div style="margin: 20px 0;">
                <div class="signature"><span class="bn"></span></div>
                <p id="and-text" style="margin: 5px; font-weight: bold;">&</p>
                <div class="signature"><span class="gn"></span></div>
            </div>
            <p id="status-text" style="font-weight: bold; color: #d4af37; letter-spacing: 1px;">STATUS: VERIFIED</p>
            <p style="font-size: 0.6rem; margin-top: 10px;">Dated: Forever & Always</p>
        </div>
        <p id="final-wish" style="margin-top: 20px; font-weight: bold; text-shadow: 0 2px 10px #000; font-size: 1.2rem;">Mubarak Ho!</p>
    </div>
</div>

<script>
    const content = {
        gf: {
            bg: "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00",
            flw: ['❤️','🌹','✨'], t: ["Pehli Dua", "Waada", "Forever Mine?"],
            m: ["Aapki muskurahat meri duniya hai.", "Main hamesha aapka sath nibhaunga.", "Will you stay in my heart forever?"],
            cert: ["MARRIAGE CERTIFICATE", "MARRIED IN HEART ❤️", "Shaadi Pakki! 💍"]
        },
        daddy: {
            bg: "https://images.unsplash.com/photo-1513159419869-1134279ea47e",
            flw: ['✨','⭐','👑'], t: ["My Hero", "Inspiration", "Best Dad?"],
            m: ["Aapne hamesha mera rasta roshan kiya.", "Main bada hokar bilkul aap jaisa banna chahta hoon.", "Are we the best Dad-Son duo?"],
            cert: ["DNA BOND CERTIFICATE", "WORLD'S BEST FATHER 🧬", "Baap-Beta No. 1! 🏆"]
        },
        brother: {
            bg: "https://images.unsplash.com/photo-1520110120835-c9653dfa4335",
            flw: ['🔥','⚡','🤜'], t: ["Partner in Crime", "Strongest Wall", "Bro Code?"],
            m: ["Har shararat aur mushkil mein mere sath rehne ke liye shukriya.", "Bhai nahi, tu meri jaan hai.", "Hamesha mere 'Partner in Crime' rahoge?"],
            cert: ["BRO CODE CONTRACT", "LEGENDARY BROTHERS 🤜🤛", "Brothers for Life! 👑"]
        },
        sister: {
            bg: "https://images.unsplash.com/photo-1543332164-6e82f355badc",
            flw: ['🌸','🎀','🍬'], t: ["Angel", "Second Mother", "Sweetest Soul?"],
            m: ["Aapki khushi mere liye duniya ki sabse badi cheez hai.", "Ghar ki raunaq aap se hi hai.", "Hamesha meri pyari behna rahogi?"],
            cert: ["BOND OF PROTECTION", "BEST SISTER EVER 💖", "Behna ka Pyar Amar! 🍭"]
        },
        friend: {
            bg: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac",
            flw: ['🍻','🤞','💎'], t: ["Yaara", "Backbone", "Bestie Forever?"],
            m: ["Tere jaisa yaar kahan, kahan aisa yaarana.", "Duniya badal jaye, par hum nahi badlenge.", "Kutte! Hamesha sath rahega na?"],
            cert: ["FRIENDSHIP DEED", "TRUE BESTIES 🤝", "Dosti Zindabad! 💎"]
        }
    };

    function makeLink() {
        const b = document.getElementById('bIn').value, g = document.getElementById('gIn').value, r = document.getElementById('relIn').value, sUrl = document.getElementById('sIn').value;
        if(!b || !g) return alert("Please enter both names!");
        let sid = '-8C_2BBVWk8';
        if(sUrl){ const m = sUrl.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); if(m&&m[2].length==11) sid=m[2]; }
        const url = window.location.href.split('?')[0] + `?boy=${encodeURIComponent(b)}&girl=${encodeURIComponent(g)}&rel=${r}&song=${sid}`;
        document.getElementById('finalLink').innerText = url;
        document.getElementById('resBox').style.display = 'block';
    }

    function copyL() { navigator.clipboard.writeText(document.getElementById('finalLink').innerText); alert("Link Copied! Send it now ❤️"); }

    const p = new URLSearchParams(window.location.search);
    const bn = p.get('boy'), gn = p.get('girl'), rel = p.get('rel') || 'gf', sn = p.get('song');

    if(bn && gn) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('experience').style.display = 'block';
        const c = content[rel];
        document.querySelectorAll('.screen').forEach(s => s.style.backgroundImage = `url('${c.bg}')`);
        document.getElementById('main-wish').innerHTML = `Happy Birthday <br><span style="color:var(--gold)">${gn}</span>!`;
        document.getElementById('t1').innerText = c.t[0]; document.getElementById('m1').innerText = c.m[0];
        document.getElementById('t2').innerText = c.t[1]; document.getElementById('m2').innerText = c.m[1];
        document.getElementById('question').innerText = c.t[2]; document.getElementById('m3').innerText = c.m[2];
        document.getElementById('cert-title').innerText = c.cert[0];
        document.getElementById('status-text').innerText = `STATUS: ${c.cert[1]}`;
        document.getElementById('final-wish').innerText = c.cert[2];
        document.querySelectorAll('.bn').forEach(e => e.innerText = bn);
        document.querySelectorAll('.gn').forEach(e => e.innerText = gn);
        document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${sn || '-8C_2BBVWk8'}?autoplay=1`;
        startRain(c.flw);
    }

    function next(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        setTimeout(() => { document.getElementById('p' + n).classList.add('active'); }, 100);
    }

    function dodge() {
        const b = document.getElementById('no-btn');
        b.style.position = 'fixed';
        b.style.left = Math.random() * (window.innerWidth - 120) + 'px';
        b.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    }

    function startRain(items) {
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerHTML = items[Math.floor(Math.random()*items.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = '25px';
            f.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }, 350);
    }
</script>
</body>
</html>
