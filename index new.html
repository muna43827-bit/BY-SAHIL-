<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Luxury Gift Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap');
        
        :root { --pink: #ffb6c1; --red: #ff4d4d; --glass: rgba(255, 255, 255, 0.85); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #fff0f5; color: #333; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Screens */
        .screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; padding: 20px; text-align: center;
            background-size: cover; background-position: center; transition: 0.5s;
        }
        .active { display: flex; opacity: 1; z-index: 10; }

        /* Generator UI */
        #generator { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(to bottom, #ff9a9e, #fecfef); z-index: 100; position: relative; overflow-y: auto; padding: 20px; }
        .input-card { background: var(--glass); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #fff; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--pink); background: #fff; font-size: 0.9rem; outline: none; }
        .btn-gold { background: var(--red); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }

        /* Gift Animation */
        .gift-box-container { position: relative; cursor: pointer; transition: 0.5s; }
        #gift-item { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 50px; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: -1;
        }
        .open-gift #gift-item { transform: translate(-50%, -150%) scale(1.5); z-index: 5; }
        .open-gift #box-emoji { transform: scale(0.8); opacity: 0.5; }

        /* Luxury Card & Pets */
        .luxury-card { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 2px solid var(--pink); width: 100%; max-width: 400px; position: relative; box-shadow: 0 10px 30px rgba(255,182,193,0.4); }
        .pet { position: absolute; width: 70px; z-index: 20; pointer-events: none; }
        .pet-l { left: -20px; bottom: -20px; animation: dance 1.5s infinite alternate; }
        .pet-r { right: -20px; top: -20px; animation: dance 1.5s infinite alternate-reverse; }
        @keyframes dance { from { transform: rotate(-10deg) translateY(0); } to { transform: rotate(10deg) translateY(-10px); } }

        .nav-btn { background: var(--red); color: #fff; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,77,77,0.3); }

        /* Floating Hearts */
        .floating-item { position: absolute; pointer-events: none; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>

<div id="generator">
    <h1 style="color:#fff; font-family:'Playfair Display'; margin-bottom:15px; text-shadow: 2px 2px 5px rgba(0,0,0,0.1);">Elite Bond Creator</h1>
    <div class="input-card">
        <input type="text" id="bIn" placeholder="Your Name">
        <input type="text" id="gIn" placeholder="Receiver Name">
        <input type="text" id="giftIn" placeholder="Enter Gift (Chocolate, Ring, Rose...)">
        
        <select id="eventIn">
            <option value="love">Express Love ❤️</option>
            <option value="birthday">Happy Birthday 🎂</option>
            <option value="congrats">Congratulations 🏆</option>
        </select>

        <input type="text" id="sIn" placeholder="YouTube Link (Song ID or Link)">
        <button class="btn-gold" onclick="makeLink()">Create Magical Link ✨</button>
        
        <div id="resBox" style="display:none; margin-top:20px;">
            <p id="finalLink" style="font-size:10px; word-break:break-all; background:#f9f9f9; padding:10px; border:1px dashed var(--red); color:var(--red);"></p>
            <button class="btn-gold" style="background:#fff; color:var(--red); border:2px solid var(--red);" onclick="copyL()">Copy & Share ❤️</button>
        </div>
    </div>
</div>

<div id="experience" style="display:none;">
    
    <div id="p1" class="screen active" style="background: white;">
        <h1 id="wish-head" style="color:var(--red); font-family:'Playfair Display'; margin-bottom:30px;"></h1>
        <div class="gift-box-container" id="gBox" onclick="openGift()">
            <div id="gift-item">🎁</div>
            <div id="box-emoji" style="font-size:100px;">📦</div>
        </div>
        <p id="gift-hint" style="margin-top:40px; font-weight:bold; color:#777;">TAP THE BOX TO OPEN YOUR GIFT!</p>
        <button id="gift-next" class="nav-btn" style="display:none;" onclick="next(2)">See What's Next ❤️</button>
    </div>

    <div id="p2" class="screen" style="background: #fff0f5;">
        <div class="luxury-card">
            <h2>A Melody For You</h2>
            <iframe id="yt-frame" width="100%" height="200" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
        <button class="nav-btn" onclick="next(3)">Listen & Continue</button>
    </div>

    <div id="p3" class="screen"><div class="luxury-card"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExdW5oamRibm9wZmdiaWwxbWd1azMwaXU1Znl5YW55YXowY2pxbjB5diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/vNpx56a9Kz0oE/giphy.gif" class="pet pet-l"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExOXVjbnpxYW95YW55YXowY2pxbjB5diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/LMc5fGZVRp5v2/giphy.gif" class="pet pet-r"><h2 id="t1"></h2><p id="m1"></p></div><button class="nav-btn" onclick="next(4)">Next Heartbeat</button></div>
    
    <div id="p4" class="screen"><div class="luxury-card"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExdW5oamRibm9wZmdiaWwxbWd1azMwaXU1Znl5YW55YXowY2pxbjB5diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3o7TKSjPqcKFBwS092/giphy.gif" class="pet pet-l"><h2>My Promise</h2><p id="m2"></p></div><button class="nav-btn" onclick="next(5)">Go Ahead</button></div>
    
    <div id="p5" class="screen"><div class="luxury-card"><img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExdW5oamRibm9wZmdiaWwxbWd1azMwaXU1Znl5YW55YXowY2pxbjB5diZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/LMc5fGZVRp5v2/giphy.gif" class="pet pet-r"><h2>Always For You</h2><p id="m3"></p></div><button class="nav-btn" onclick="next(6)">Feeling Happy?</button></div>
    
    <div id="p6" class="screen"><div class="luxury-card"><h2>The Secret</h2><p id="m4"></p></div><button class="nav-btn" onclick="next(7)">Almost There</button></div>

    <div id="p7" class="screen"><div class="luxury-card"><h2>Final Question</h2><p id="m5"></p></div><div style="display:flex; gap:10px; margin-top:20px; justify-content:center;"><button class="nav-btn" style="background:#2ecc71;" onclick="next(8)">YES! ✅</button><button id="no-btn" class="nav-btn" onmouseover="dodge()">NO ❌</button></div></div>

    <div id="p8" class="screen"><div class="luxury-card" style="border:10px double var(--red); background:#fff;"><h3>CERTIFICATE</h3><br><div style="font-family:'Great Vibes'; font-size:2rem;" class="bn"></div><p>&</p><div style="font-family:'Great Vibes'; font-size:2rem;" class="gn"></div><br><p id="status-text" style="font-weight:bold; color:var(--red);"></p></div><button class="nav-btn" onclick="next(9)">Final Gift</button></div>

    <div id="p9" class="screen"><h1 id="final-wish" style="font-family:'Great Vibes'; font-size:4rem; color:var(--red);"></h1><div class="luxury-card"><p id="m-last"></p></div><p style="margin-top:20px;">Created with Love ❤️</p></div>
</div>

<script>
    function makeLink() {
        const b = document.getElementById('bIn').value, g = document.getElementById('gIn').value, 
              gt = document.getElementById('giftIn').value || "Chocolate", ev = document.getElementById('eventIn').value, 
              sUrl = document.getElementById('sIn').value;
        if(!b || !g) return alert("Fill names!");
        let sid = sUrl.includes('v=') ? sUrl.split('v=')[1].substring(0,11) : (sUrl || '3AtDnEC4zak');
        const url = `${window.location.origin}${window.location.pathname}?b=${encodeURIComponent(b)}&g=${encodeURIComponent(g)}&gt=${encodeURIComponent(gt)}&ev=${ev}&s=${sid}`;
        document.getElementById('finalLink').innerText = url;
        document.getElementById('resBox').style.display = 'block';
    }

    function copyL() { navigator.clipboard.writeText(document.getElementById('finalLink').innerText); alert("Link Copied!"); }

    const params = new URLSearchParams(window.location.search);
    const bn = params.get('b'), gn = params.get('g'), gift = params.get('gt'), ev = params.get('ev'), sn = params.get('s');

    if(bn && gn) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('experience').style.display = 'block';
        document.getElementById('wish-head').innerText = `Special Surprise for ${gn}`;
        document.getElementById('gift-item').innerText = gift;
        
        // Data Fill
        document.getElementById('t1').innerText = "For My Dearest";
        document.getElementById('m1').innerText = `Hi ${gn}, ye chota sa tohfa tumhari smile ke liye...`;
        document.getElementById('m2').innerText = "Tum meri life ka sabse bada gift ho.";
        document.getElementById('m3').innerText = "Main hamesha tumhara sath nibhaunga, chahe kuch bhi ho.";
        document.getElementById('m4').innerText = "Kya tumne apna gift pasand kiya?";
        document.getElementById('m5').innerText = "Kya hum hamesha aise hi saath rahenge?";
        document.getElementById('status-text').innerText = "OFFICIALLY CONNECTED ❤️";
        document.getElementById('final-wish').innerText = "Forever Yours";
        document.getElementById('m-last').innerText = "I Love You So Much!";
        
        document.querySelectorAll('.bn').forEach(e => e.innerText = bn);
        document.querySelectorAll('.gn').forEach(e => e.innerText = gn);
        document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${sn}?autoplay=1`;
        
        startRain();
    }

    function openGift() {
        document.getElementById('gBox').classList.add('open-gift');
        document.getElementById('gift-hint').innerText = `You Received: ${gift}! ✨`;
        document.getElementById('gift-next').style.display = 'inline-block';
    }

    function next(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('p' + n).classList.add('active');
        // Page background changes
        const colors = ["#fff", "#fff0f5", "#ffe4e1", "#fffafa", "#fdf5e6", "#f0fff0", "#f5f5f5", "#fff", "#ffe4e1"];
        document.getElementById('p' + n).style.background = colors[n-1];
    }

    function dodge() {
        const b = document.getElementById('no-btn');
        b.style.position = 'fixed';
        b.style.left = Math.random() * 80 + '%';
        b.style.top = Math.random() * 80 + '%';
    }

    function startRain() {
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'floating-item';
            f.innerHTML = '❤️';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = Math.random() * 20 + 10 + 'px';
            f.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }, 600);
    }
</script>
</body>
</html>
